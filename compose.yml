services:
  db:
    image: docker.io/library/mariadb:11
    pull_policy: if_not_present
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: matrix
      MARIADB_USER: matrix
      MARIADB_PASSWORD: matrix
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.tools
    image: localhost/matrix-tools:dev
    command:
      - sh
      - -c
      - mysqldef --host=db --port=3306 --user=matrix --password=matrix matrix < /workspace/schema/schema.sql
    volumes:
      - .:/workspace:ro
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  tools:
    build:
      context: .
      dockerfile: Dockerfile.tools
    image: localhost/matrix-tools:dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_SCHEMA_USER: matrix
      DB_SCHEMA_PASS: matrix
      DB_NAME: matrix
    depends_on:
      db:
        condition: service_healthy
    command: sleep infinity
    stdin_open: true
    tty: true

  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost/matrix-server:dev
    environment:
      DATABASE_URL: mysql://matrix:matrix@db:3306/matrix
      BIND_ADDR: 0.0.0.0:8448
      SERVER_NAME: localhost
      RUST_LOG: server=debug,tower_http=debug
    ports:
      - "8448:8448"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  db_data:
